<html>
    <head>
        <title>View Books</title>
    </head>
    <body>
        <h1 style="color: rgb(136, 10, 10);">BOOKS IN THE LIBRARY</h1>
        <ul>
            <table border="1">
                <tr>
                    <th>Sl No</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Price</th>
                    <th>Published Date</th>
                
                </tr>
                {% for book in books %}
                <tr>
                    <td>{{ forloop.counter}}</td>
                    <td>{{ book.title }}</td>
                    <td>{{ book.author }}</td>
                    <td>{{ book.price }}</td>
                    <td>{{ book.published_date }}</td>
                
                </tr>
                {% endfor %}
            </table>
        </ul>
        <button>
            <a href="{% url 'book' %}">Go to home page</a>
        </button>
    </body>
</html>
