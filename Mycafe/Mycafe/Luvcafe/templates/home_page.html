{% extends 'base.html' %}
{% load static %}

{% block title %}Welcome to LUVCAFE{% endblock %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap');

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: url("{% static 'images/Luvcafe.png' %}") no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
    }

    .hero-container {
        min-height: 100vh;
        width: 100%;
        /* Dark gradient overlay to make the white text pop */
        background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
        backdrop-filter: blur(2px);
    }

    .hero-content {
        animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h1 {
        font-family: 'Playfair Display', serif;
        font-size: 4.5rem;
        color: white;
        margin: 0;
        line-height: 1;
        text-shadow: 2px 4px 15px rgba(0,0,0,0.5);
    }

    h1 span {
        color: #ff6a00; /* Signature Warm Orange */
        font-style: italic;
    }

    h2 {
        font-weight: 300;
        color: rgba(255, 255, 255, 0.9);
        font-size: 1.4rem;
        margin-top: 15px;
        margin-bottom: 40px;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .home-actions {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
    }

    /* Main CTA Button (Sign In) */
    .btn-main {
        padding: 18px 45px;
        font-size: 1.1rem;
        font-weight: 600;
        text-decoration: none;
        color: white;
        background: linear-gradient(90deg, #ff6a00, #ee0979);
        border-radius: 50px;
        box-shadow: 0 10px 25px rgba(238, 9, 121, 0.4);
        transition: all 0.4s ease;
        border: none;
    }

    .btn-main:hover {
        transform: translateY(-5px) scale(1.05);
        box-shadow: 0 15px 30px rgba(238, 9, 121, 0.6);
    }

    /* Secondary CTA Button (View Menu) */
    .btn-secondary {
        padding: 18px 45px;
        font-size: 1.1rem;
        font-weight: 600;
        text-decoration: none;
        color: white;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 2px solid white;
        border-radius: 50px;
        transition: all 0.4s ease;
    }

    .btn-secondary:hover {
        background: white;
        color: black;
        transform: translateY(-5px);
    }

    /* Floating Scroll Indicator */
    .scroll-hint {
        position: absolute;
        bottom: 30px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.9rem;
        animation: bounce 2s infinite;
    }

    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
        40% {transform: translateY(-10px);}
        60% {transform: translateY(-5px);}
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
        h1 { font-size: 3rem; }
        h2 { font-size: 1.1rem; }
        .btn-main, .btn-secondary {
            width: 80%;
            padding: 15px 30px;
        }
    }
</style>

<div class="hero-container">
    <div class="hero-content">
        <h1>Welcome to <span>LUVCAFE</span></h1>
        <h2>A Story in Every Sip.</h2>
        
        <div class="home-actions">
            <a class="btn-main" href="{% url 'signin' %}">Order Online Now</a>
            <a class="btn-secondary" href="{% url 'public_menu' %}">View the Menu</a>
        </div>
    </div>

    <div class="scroll-hint">
        Explore more <br> ↓
    </div>
</div>
{% endblock %}
