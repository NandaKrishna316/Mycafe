{% extends 'base.html' %}
{% load static %}

{% block content %}
<body class="add-taste-bg">
<link rel="stylesheet" href="{% static 'css/base.css' %}">
<div id="add-taste-page" class="container">
    <div class="form-card">
        <h1>Add New Taste</h1>
        
        <form method="post">
            {% csrf_token %}
            
            <label for="tastes">Item Name</label>
            <input type="text" id="tastes" name="tastes" placeholder="e.g. Cappuccino" required>

            <label for="price">Price (₹)</label>
            <input type="number" id="price" name="price" placeholder="0.00" required>

            <button type="submit">Add to Menu</button>
        </form>

        <div class="add-actions">
            <a class="add-button" href="{% url 'your_order' %}">View Current Menu</a>
            <a class="add-button" href="{% url 'admin_page' %}">Return to Dashboard</a>
        </div>
    </div>
</div>

</body>
{% endblock %}
