{% extends 'base.html' %}
{% load static %}

{% block title %}Join LUVCAFE | Sign Up{% endblock %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap');

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: url("{% static 'images/Luvcafe.png' %}") no-repeat center center fixed;
        background-size: cover;
        /* Allow scrolling for longer forms on mobile */
        min-height: 100vh;
    }

    .signup-wrapper {
        min-height: 100vh;
        width: 100%;
        background: linear-gradient(135deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.8) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
        padding: 40px 20px;
        box-sizing: border-box;
    }

    .signup-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 30px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        color: white;
        animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }

    .brand-logo {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        margin-bottom: 5px;
    }

    .brand-logo span {
        color: #ff6a00;
    }

    h2 {
        font-weight: 300;
        font-size: 1.2rem;
        letter-spacing: 2px;
        margin-bottom: 30px;
        color: rgba(255, 255, 255, 0.8);
        text-transform: uppercase;
    }

    /* Form Layout */
    .form-group {
        margin-bottom: 15px;
        position: relative;
    }

    .form-group input {
        width: 100%;
        padding: 14px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 15px;
        color: white;
        font-size: 0.95rem;
        text-align: center; /* Keeping your centered typing style */
        outline: none;
        transition: all 0.3s ease;
        box-sizing: border-box;
    }

    .form-group input:focus {
        background: rgba(255, 255, 255, 0.15);
        border-color: #ff6a00;
        box-shadow: 0 0 10px rgba(255, 106, 0, 0.3);
    }

    /* Primary Sign Up Button */
    .signup-btn {
        width: 100%;
        padding: 15px;
        margin-top: 15px;
        background: linear-gradient(90deg, #ff6a00, #ee0979);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.4s;
        box-shadow: 0 10px 20px rgba(238, 9, 121, 0.3);
    }

    .signup-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 25px rgba(238, 9, 121, 0.5);
        filter: brightness(1.1);
    }

    /* Navigation Links */
    .footer-links {
        margin-top: 25px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .login-link {
        color: white;
        text-decoration: none;
        font-size: 0.9rem;
        opacity: 0.8;
    }

    .login-link span {
        color: #ff6a00;
        font-weight: 600;
        text-decoration: underline;
    }

    .home-link {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-size: 0.85rem;
        transition: 0.3s;
    }

    .home-link:hover {
        color: white;
    }

    /* Mobile Responsive */
    @media (max-width: 480px) {
        .signup-card {
            padding: 30px 20px;
        }
    }
</style>

<div class="signup-wrapper">
    <div class="signup-card">
        <div class="brand-logo">LUV<span>CAFE</span></div>
        <h2>Create Account</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>

            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="form-group">
                <input type="text" name="home_address" placeholder="Delivery Address" required>
            </div>

            <div class="form-group">
                <input type="tel" name="contact_number" placeholder="Phone Number" required>
            </div>

            <button type="submit" class="signup-btn">Start Ordering</button>
        </form>

        <div class="footer-links">
            <a href="{% url 'signin' %}" class="login-link">
                Already have an account? <span>Sign In</span>
            </a>
            <a href="{% url 'home_page' %}" class="home-link">← Back to Home</a>
        </div>
    </div>
</div>

{% endblock %}
