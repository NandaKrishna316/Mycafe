{% extends 'base.html' %}
{% load static %}

{% block title %}Sign In | LUVCAFE{% endblock %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap');

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: url("{% static 'images/Luvcafe.png' %}") no-repeat center center fixed;
        background-size: cover;
        /* FIX: Changed height to min-height to allow scrolling */
        min-height: 100vh;
    }

    .signin-wrapper {
        /* FIX: Changed height to min-height and added padding */
        min-height: 100vh;
        width: 100%;
        background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
        padding: 40px 20px; /* Space for scrolling on mobile */
        box-sizing: border-box;
    }

    .signin-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 30px;
        padding: 50px 40px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        animation: fadeInDown 0.8s ease-out;
    }

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .brand-title {
        font-family: 'Playfair Display', serif;
        font-size: 3rem;
        color: #fff;
        margin: 0;
        letter-spacing: 2px;
    }

    .brand-accent {
        color: #ff6a00;
        text-shadow: 0 0 15px rgba(255, 106, 0, 0.4);
    }

    .subtitle {
        color: rgba(255, 255, 255, 0.7);
        font-size: 1rem;
        margin-bottom: 30px;
        letter-spacing: 1px;
    }

    /* Django Form Styling */
    form p {
        text-align: left;
        margin-bottom: 15px;
        color: white;
    }

    form input {
        width: 100%;
        padding: 12px 15px;
        margin-top: 5px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.1);
        color: white;
        box-sizing: border-box;
        outline: none;
        transition: 0.3s;
    }

    form input:focus {
        background: rgba(255, 255, 255, 0.2);
        border-color: #ff6a00;
        box-shadow: 0 0 8px rgba(255, 106, 0, 0.4);
    }

    .btn-signin {
        width: 100%;
        margin-top: 20px;
        background: linear-gradient(90deg, #ff6a00, #ee0979);
        color: white;
        padding: 14px;
        border: none;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.4s;
        box-shadow: 0 10px 20px rgba(238, 9, 121, 0.3);
    }

    .btn-signin:hover {
        transform: scale(1.02);
        box-shadow: 0 15px 25px rgba(238, 9, 121, 0.5);
    }

    .signin-actions {
        margin-top: 25px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .link-signup {
        color: white;
        text-decoration: none;
        font-size: 0.9rem;
        opacity: 0.8;
    }

    .link-signup span {
        color: #ff6a00;
        font-weight: 600;
        text-decoration: underline;
    }

    .btn-home {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-size: 0.85rem;
        margin-top: 10px;
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
        .signin-card {
            padding: 30px 20px;
        }
        .brand-title {
            font-size: 2.2rem;
        }
    }
</style>

<div class="signin-wrapper">
    <div class="signin-card">
        <h1 class="brand-title">LUV<span class="brand-accent">CAFE</span></h1>
        <p class="subtitle">Experience the perfect blend.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-signin">Sign In</button>
        </form>

        <div class="signin-actions">
            <a href="{% url 'signup' %}" class="link-signup">
                Don't have an account? <span>Sign Up</span>
            </a>
            <a href="{% url 'home_page' %}" class="btn-home">
                ← Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
