{% extends 'base.html' %}

{% block title %}Sign In{% endblock %}

{% block content %}
    <h1>Welcome to LUVCAFE</h1>
    <h2>Sign In</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign In</button>
    </form>
    <button> 
        <a href="{% url 'signup' %}">Don't have an account? Sign Up</a>
    </button>
    <button>
        <a href="{% url 'home_page' %}">Back to Home</a>
    </button>
{% endblock %}
