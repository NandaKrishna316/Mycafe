{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Item | LUVCAFE Admin{% endblock %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        /* Using your uploaded image as the background */
        background: url("{% static 'images/Luvcafe.png' %}") no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
    }

    .delete-wrapper {
        min-height: 100vh;
        width: 100%;
        background: rgba(0, 0, 0, 0.75); /* Darker overlay for focus */
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(8px);
        padding: 20px;
        box-sizing: border-box;
    }

    .delete-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 30px;
        padding: 50px 40px;
        width: 100%;
        max-width: 450px;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        color: white;
        animation: shake 0.5s ease-in-out; /* Subtle attention-grabber */
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }

    h2 {
        color: #ff4757; /* Warning Red */
        font-size: 1.8rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 20px;
    }

    .warning-text {
        font-weight: 300;
        opacity: 0.8;
        margin-bottom: 10px;
    }

    .item-details {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 15px;
        padding: 20px;
        margin: 20px 0;
        border: 1px dashed rgba(255, 255, 255, 0.3);
    }

    .item-details h3 {
        margin: 0;
        font-size: 1.4rem;
        color: #f1c40f; /* Gold accent */
    }

    /* Action Buttons */
    .delete-actions {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 30px;
    }

    .btn-delete {
        background: #ff4757;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
    }

    .btn-delete:hover {
        background: #ff6b81;
        transform: scale(1.02);
        box-shadow: 0 15px 25px rgba(255, 71, 87, 0.5);
    }

    .btn-cancel {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid white;
        color: white;
        padding: 12px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn-cancel:hover {
        background: white;
        color: black;
    }

    .btn-admin {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.85rem;
        margin-top: 10px;
        transition: 0.3s;
    }

    .btn-admin:hover {
        color: white;
    }
</style>

<div class="delete-wrapper">
    <div class="delete-card">
        <h2>Confirm Delete</h2>
        <p class="warning-text">Are you sure you want to remove this item?</p>

        <div class="item-details">
            <h3>{{ item.tastes }}</h3>
            <p>Price: ₹{{ item.price }}</p>
        </div>

        <form method="POST" class="delete-actions">
            {% csrf_token %}
            <button type="submit" class="btn-delete">Yes, Delete Item</button>
            <a href="{% url 'manage_menu' %}" class="btn-cancel">Cancel & Go Back</a>
            <a href="{% url 'admin_page' %}" class="btn-admin">Return to Dashboard</a>
        </form>
    </div>
</div>
{% endblock %}
