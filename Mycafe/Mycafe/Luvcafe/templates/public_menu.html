{% extends 'base.html' %}

{% block content %}

<h2>Today's Menu</h2>

{% for item in items %}

        <h3>{{ item.tastes }}</h3>
        <p>Price: ₹{{ item.price }}</p>
    </div>
{% endfor %}

<br>

<a href="{% url 'signin' %}">
    <button>Login to Order</button>
</a>

<button>
    <a href="{% url 'home_page' %}">Go to home page</a>
</button>

{% endblock %}
